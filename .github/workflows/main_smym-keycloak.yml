name: Build and deploy Keycloak to AKS

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

env:
  ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
  ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
  ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
  IMAGE_NAME: keycloak
  JAVA_VERSION: '21'
  JAVA_DISTRIBUTION: 'microsoft'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      image_tag: ${{ steps.extract_version.outputs.image_tag }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: extract_version
        run: |
          echo "IMAGE_TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
          echo "image_tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Set up Java version
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Update pom.xml version
        run: mvn versions:set -DnewVersion=${{ env.IMAGE_TAG }} -DgenerateBackupPoms=false -f keycloak-extensions/pom.xml

      - name: Update Chart.yaml and values.yaml version
        run: |
          sed -i "s/^appVersion:.*/appVersion: \"${{ env.IMAGE_TAG }}\"/" ./chart/Chart.yaml
          sed -i "s/^  tag:.*/  tag: \"${{ env.IMAGE_TAG }}\"/" ./chart/values.yaml

      - name: Commit version bumps
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add keycloak-extensions/pom.xml ./chart/Chart.yaml ./chart/values.yaml
          git commit -m "chore: bump version to ${{ env.IMAGE_TAG }}"
          git push origin HEAD:main

      - name: Build keycloak-extensions jar
        run: mvn clean package -DskipTests -f keycloak-extensions/pom.xml

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to ACR
        uses: docker/login-action@v2
        with:
          registry: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ env.ACR_USERNAME }}
          password: ${{ env.ACR_PASSWORD }}

      - name: Build and push image to ACR
        uses: docker/build-push-action@v3
        with:
          push: true
          tags: ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          file: ./Dockerfile
          build-args: |
            KEYCLOAK_EXTENSIONS_VERSION=${{ env.IMAGE_TAG }}

      - name: Set next SNAPSHOT version
        run: |
          IFS='.' read -r MAJOR MINOR PATCH <<< "${{ env.IMAGE_TAG }}"
          NEXT_VERSION="$MAJOR.$MINOR.$((PATCH + 1))-SNAPSHOT"
          mvn versions:set -DnewVersion=$NEXT_VERSION -DgenerateBackupPoms=false -f keycloak-extensions/pom.xml
          git add keycloak-extensions/pom.xml
          git commit -m "chore: set next development version to $NEXT_VERSION"
          git push origin HEAD:main

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Set up kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Deploy Keycloak
        run: |
          helm upgrade --install keycloak ./chart \
            --namespace keycloak \
            --create-namespace \
            -f ./chart/values.yaml \
            --set image.repository=${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }} \
            --set image.tag=${{ needs.build.outputs.image_tag }} \
            --wait
