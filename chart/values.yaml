# Default values for chart.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: smymregistry.azurecr.io/keycloak
  tag: "1.0.0-SNAPSHOT"
  pullPolicy: IfNotPresent

resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: "2"
    memory: 1Gi

env:
  KC_HOSTNAME: "https://keycloak.scottmakesyoumove.com"
  KC_HOSTNAME_ADMIN_URL: "http://smym-keycloak.keycloak.svc.cluster.local:8080"
  KC_HOSTNAME_URL: "https://keycloak.scottmakesyoumove.com"
  KEYCLOAK_FRONTEND_URL: "https://keycloak.scottmakesyoumove.com"

envFrom:
  - configMapRef:
      name: keycloak-configmap
  - secretRef:
      name: keycloak-sealed-secrets

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: true
  className: nginx
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-buffer-size: "128k"
    nginx.ingress.kubernetes.io/proxy-buffers-number: "4"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: keycloak.scottmakesyoumove.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: keycloak-scottmakesyoumove-tls
      hosts:
        - keycloak.scottmakesyoumove.com
